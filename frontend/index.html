<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Monitor MVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📡 Uptime Monitor</h1>
        <form id="add-url-form">
            <input type="text" id="url-input" placeholder="https://example.com" required>
            <button type="submit">Monitor URL</button>
        </form>
        <table id="url-table">
            <thead>
                <tr>
                    <th>URL</th>
                    <th>Status</th>
                    <th>Response Time</th>
                    <th>Last Checked</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows injected via JS -->
            </tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
